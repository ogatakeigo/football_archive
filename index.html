<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Archive</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a1a; --muted: #6b6b6b; --muted-2: #8a8a8a;
    --border: #e0e0e0; --border-light: #eeeeee; --surface: #fafafa; --surface-2: #f5f5f5;
    --accent: #1a1a1a; --hover: #f0f0f0;
    --cat-club: #2563eb; --cat-club-bg: #dbeafe; --cat-nat: #dc2626; --cat-nat-bg: #fee2e2;
    --reg-eu: #2563eb; --reg-sa: #16a34a; --reg-na: #dc2626; --reg-as: #d97706; --reg-af: #7c3aed; --reg-oc: #0891b2;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 14px; line-height: 1.6; color: var(--fg); background: var(--bg); margin: 0; padding: 48px 20px; }
  .container { max-width: 1080px; margin: 0 auto; }
  header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; text-decoration: none; color: var(--fg); cursor: pointer; width: fit-content; }
  .logo-mark { width: 44px; height: 44px; border: 2px solid var(--fg); position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--fg); color: #fff; }
  .logo-mark::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: #fff; transform: translateY(-50%); }
  .logo-mark::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: #fff; transform: translateX(-50%); }
  .logo-mark span { position: relative; z-index: 1; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 18px; font-weight: 800; letter-spacing: -1px; background: var(--fg); padding: 0 2px; line-height: 1; }
  .logo-text { display: flex; flex-direction: column; line-height: 1; }
  .logo-text .word1 { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .logo-text .word2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
  .intro { font-size: 13px; color: var(--muted); max-width: 640px; line-height: 1.7; }
  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 20px; flex-wrap: wrap; }
  .breadcrumb a { color: var(--muted); text-decoration: none; cursor: pointer; padding: 4px 8px; border: 1px solid var(--border); background: var(--surface); transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .breadcrumb a:hover { background: var(--hover); color: var(--fg); }
  .breadcrumb .sep { color: var(--border); font-family: "SF Mono", Menlo, Consolas, monospace; }
  .breadcrumb .current { padding: 4px 8px; color: var(--fg); font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .breadcrumb .flag { width: 16px; height: 12px; border: 1px solid var(--border-light); object-fit: cover; }
  .section-num { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
  h2 { font-size: 20px; font-weight: 600; margin: 0 0 18px 0; padding-bottom: 10px; border-bottom: 1px solid var(--fg); letter-spacing: -0.1px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h2 .count { font-size: 12px; color: var(--muted); font-weight: 400; font-family: "SF Mono", Menlo, Consolas, monospace; margin-left: auto; }
  .group-heading { display: flex; align-items: center; gap: 12px; margin: 28px 0 14px 0; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
  .group-heading .bar { width: 4px; height: 18px; border-radius: 2px; }
  .group-heading.club .bar { background: var(--cat-club); }
  .group-heading.eu .bar { background: var(--reg-eu); }
  .group-heading.sa .bar { background: var(--reg-sa); }
  .group-heading.na .bar { background: var(--reg-na); }
  .group-heading.as .bar { background: var(--reg-as); }
  .group-heading.af .bar { background: var(--reg-af); }
  .group-heading.oc .bar { background: var(--reg-oc); }
  .group-heading .title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
  .group-heading .count { font-size: 11px; color: var(--muted); font-family: "SF Mono", Menlo, Consolas, monospace; margin-left: auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .grid.seasons { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .grid.teams { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .card { border: 1px solid var(--border); border-top: 3px solid transparent; background: var(--bg); padding: 16px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; gap: 10px; text-align: left; font-family: inherit; font-size: inherit; color: inherit; }
  .card:hover { background: var(--surface); border-color: #c0c0c0; }
  .card.club { border-top-color: var(--cat-club); }
  .card.eu { border-top-color: var(--reg-eu); }
  .card.sa { border-top-color: var(--reg-sa); }
  .card.na { border-top-color: var(--reg-na); }
  .card.as { border-top-color: var(--reg-as); }
  .card.af { border-top-color: var(--reg-af); }
  .card.oc { border-top-color: var(--reg-oc); }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .card-flag { width: 28px; height: 21px; border: 1px solid var(--border-light); object-fit: cover; flex-shrink: 0; }
  .card-flag.sq { width: 26px; height: 26px; border-radius: 50%; }
  .card-name { font-size: 15px; font-weight: 600; letter-spacing: -0.1px; line-height: 1.3; flex: 1; }
  .card-sub { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .card-meta { font-size: 11px; color: var(--muted-2); padding-top: 8px; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
  .card-meta .arrow { color: var(--muted); font-family: "SF Mono", Menlo, Consolas, monospace; transition: transform 0.15s; }
  .card:hover .card-meta .arrow { transform: translateX(3px); color: var(--fg); }
  .card.season { padding: 14px 16px; gap: 4px; border-top-color: var(--border); }
  .card.season .year { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .card.season .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .card.season.available { border-top-color: var(--cat-club); }
  .card.season.unavailable { opacity: 0.45; cursor: not-allowed; }
  .card.season.unavailable:hover { background: var(--bg); border-color: var(--border); }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input { width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border); background: var(--bg); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.15s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before { content: "⌕"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
  .search-results { border: 1px solid var(--border); background: var(--bg); margin-bottom: 20px; }
  .search-results .sr-heading { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .search-results .sr-heading .count { font-family: "SF Mono", Menlo, Consolas, monospace; }
  .sr-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.1s; }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover { background: var(--surface); }
  .sr-item .sr-flag { width: 20px; height: 15px; border: 1px solid var(--border-light); object-fit: cover; flex-shrink: 0; }
  .sr-item .sr-flag.sq { width: 18px; height: 18px; border-radius: 50%; }
  .sr-item .sr-name { font-size: 14px; font-weight: 500; flex: 1; }
  .sr-item .sr-type { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .sr-item .sr-path { font-size: 11px; color: var(--muted); }
  .sr-empty { padding: 16px 14px; text-align: center; color: var(--muted); font-size: 12px; font-style: italic; }
  footer { margin-top: 64px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); text-align: center; letter-spacing: 0.5px; }
  .hidden { display: none !important; }
  @media (max-width: 640px) {
    body { padding: 24px 12px; font-size: 13px; }
    .logo-mark { width: 38px; height: 38px; }
    .logo-mark span { font-size: 15px; }
    .logo-text .word2 { font-size: 22px; }
    .grid { grid-template-columns: 1fr; }
    .grid.seasons { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <a class="logo" id="logo">
    <div class="logo-mark"><span>FA</span></div>
    <div class="logo-text">
      <div class="word1">Football</div>
      <div class="word2">Archive</div>
    </div>
  </a>
  <p class="intro">A structured database of football clubs and national teams across Europe's top leagues and international competitions. Browse by league, explore squads season by season, and revisit the tactical stories behind each campaign.</p>
</header>

<nav class="breadcrumb" id="breadcrumb"></nav>

<div class="toolbar">
  <div class="search-box">
    <input type="text" id="search" placeholder="Search leagues or teams...">
  </div>
</div>

<div class="search-results hidden" id="searchResults"></div>

<main id="view"></main>

<footer>FOOTBALL ARCHIVE</footer>

</div>

<script>
const DATA = {"leagues":[{"country":"England","countryCode":"gb-eng","tier":"Top flight","name":"Premier League","id":"premier-league","type":"club","group":"club","order":10},{"group":"club","order":20,"id":"la-liga","type":"club","tier":"Top flight","name":"La Liga","countryCode":"es","country":"Spain"},{"country":"Italy","countryCode":"it","type":"club","id":"serie-a","tier":"Top flight","name":"Serie A","order":30,"group":"club"},{"country":"Germany","countryCode":"de","type":"club","id":"bundesliga","tier":"Top flight","name":"Bundesliga","group":"club","order":40},{"country":"France","countryCode":"fr","tier":"Top flight","name":"Ligue 1","id":"ligue-1","type":"club","order":50,"group":"club"},{"group":"club","order":60,"id":"primeira-liga","type":"club","name":"Primeira Liga","tier":"Top flight","countryCode":"pt","country":"Portugal"},{"country":"UEFA","countryCode":"eu","tier":"National teams","name":"Europe","type":"nat","id":"nat-europe","group":"eu","order":110},{"country":"CONMEBOL","countryCode":"un","type":"nat","id":"nat-south-america","tier":"National teams","name":"South America","order":120,"group":"sa"},{"country":"CONCACAF","countryCode":"un","tier":"National teams","name":"North America","type":"nat","id":"nat-north-america","group":"na","order":130},{"name":"Asia","tier":"National teams","type":"nat","id":"nat-asia","order":140,"group":"as","country":"AFC","countryCode":"un"},{"countryCode":"un","country":"CAF","group":"af","order":150,"name":"Africa","tier":"National teams","type":"nat","id":"nat-africa"},{"group":"oc","order":160,"id":"nat-oceania","type":"nat","tier":"National teams","name":"Oceania","countryCode":"un","country":"OFC"}],"seasons":{"club":[],"nat":{}},"teams":{"premier-league":[{"id":"man-united","name":"Manchester United","countryCode":"gb-eng","city":"Manchester"}],"la-liga":[{"id":"real-madrid","name":"Real Madrid","countryCode":"es","city":"Madrid"}],"serie-a":[{"id":"juventus","name":"Juventus","countryCode":"it","city":"Turin"}],"bundesliga":[{"id":"bayern","name":"Bayern Munich","countryCode":"de","city":"Munich"}],"ligue-1":[{"id":"psg","name":"Paris Saint-Germain","countryCode":"fr","city":"Paris"}],"primeira-liga":[{"id":"porto","name":"FC Porto","countryCode":"pt","city":"Porto"}],"nat-europe":[{"id":"nt-france","name":"France","countryCode":"fr","city":"UEFA"}],"nat-south-america":[{"id":"nt-brazil","name":"Brazil","countryCode":"br","city":"CONMEBOL"}],"nat-asia":[{"id":"nt-japan","name":"Japan","countryCode":"jp","city":"AFC"}]},"leagueDefaults":{},"teamSpecific":{"premier-league|man-united":["2007-08"],"la-liga|real-madrid":["2014-15"],"serie-a|juventus":["2012-13"],"bundesliga|bayern":["2019-20"],"ligue-1|psg":["2024-25"],"primeira-liga|porto":["2014-15"],"nat-europe|nt-france":["2024"],"nat-south-america|nt-brazil":["2022"]},"reports":{"premier-league|man-united|2007-08":"man-united_2007_08.html","la-liga|real-madrid|2014-15":"real-madrid_2014_15.html","serie-a|juventus|2012-13":"juventus_2012-13.html","bundesliga|bayern|2019-20":"bayern_2019_20.html","ligue-1|psg|2024-25":"psg_2024_25.html","primeira-liga|porto|2014-15":"porto_2014_15.html"}};




function readStateFromQuery() {
  const params = new URLSearchParams(window.location.search);
  const s = { league: null, team: null };
  const leagueParam = params.get("league");
  if (leagueParam && leagueById(leagueParam)) {
    s.league = leagueParam;
    const teamParam = params.get("team");
    if (teamParam && teamsOf(leagueParam).some(t => t.id === teamParam)) {
      s.team = teamParam;
    }
  }
  return s;
}
const state = { league: null, team: null };

function flagUrl(code) { if (!code) return ""; if (code === "un" || code === "eu") return "https://flagcdn.com/w40/un.png"; return "https://flagcdn.com/w40/" + code + ".png"; }
function reportKey(l, t, s) { return l + "|" + t + "|" + s; }
function isNatLeague(id) { return id && id.indexOf("nat-") === 0; }
function leagueById(id)  { return DATA.leagues.find(x => x.id === id); }
function teamsOf(leagueId) { return DATA.teams[leagueId] || []; }
function seasonsFor(leagueId, teamId) {
  var k = leagueId + '|' + teamId;
  if (DATA.teamSpecific[k] && DATA.teamSpecific[k].length) return DATA.teamSpecific[k];
  return DATA.leagueDefaults[leagueId] || [];
}
function escapeHtml(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])); }

function renderBreadcrumb() {
  const bc = document.getElementById("breadcrumb");
  const parts = [];
  parts.push('<a data-nav="home">⌂ Home</a>');
  if (state.league) {
    const l = leagueById(state.league);
    if (!l) { state.league = null; state.team = null; return renderBreadcrumb(); }
    parts.push('<span class="sep">/</span>');
    if (state.team) parts.push('<a data-nav="league"><img class="flag" src="' + flagUrl(l.countryCode) + '" alt="">' + escapeHtml(l.name) + '</a>');
    else parts.push('<span class="current"><img class="flag" src="' + flagUrl(l.countryCode) + '" alt="">' + escapeHtml(l.name) + '</span>');
  }
  if (state.team) {
    const t = teamsOf(state.league).find(x => x.id === state.team);
    if (!t) { state.team = null; return renderBreadcrumb(); }
    parts.push('<span class="sep">/</span>');
    parts.push('<span class="current"><img class="flag" src="' + flagUrl(t.countryCode) + '" alt="">' + escapeHtml(t.name) + '</span>');
  }
  bc.innerHTML = parts.join("");
  bc.querySelectorAll("a[data-nav]").forEach(a => {
    a.addEventListener("click", () => {
      const target = a.dataset.nav;
      if (target === "home") { state.league = null; state.team = null; }
      if (target === "league") { state.team = null; }
      render();
    });
  });
}

function viewLeagues() {
  const clubs = DATA.leagues.filter(l => l.type === "club");
  const nats  = DATA.leagues.filter(l => l.type === "nat");
  const clubCards = clubs.map(l =>
    '<button class="card club" data-league="' + l.id + '">' +
    '<div class="card-top"><img class="card-flag" src="' + flagUrl(l.countryCode) + '" alt=""><span class="card-name">' + escapeHtml(l.name) + '</span></div>' +
    '<div class="card-sub"><span>' + escapeHtml(l.country) + '</span></div>' +
    '<div class="card-meta"><span>' + teamsOf(l.id).length + ' clubs</span><span class="arrow">→</span></div>' +
    '</button>'
  ).join("");
  const natCards = nats.map(l =>
    '<button class="card ' + l.group + '" data-league="' + l.id + '">' +
    '<div class="card-top"><span class="card-name">' + escapeHtml(l.name) + '</span></div>' +
    '<div class="card-sub"><span>' + escapeHtml(l.country) + '</span></div>' +
    '<div class="card-meta"><span>' + teamsOf(l.id).length + ' teams</span><span class="arrow">→</span></div>' +
    '</button>'
  ).join("");
  return '<div class="section-num">00 / SELECT LEAGUE</div>' +
    '<h2>Leagues <span class="count">' + DATA.leagues.length + ' total</span></h2>' +
    (clubs.length ? '<div class="group-heading club"><span class="bar"></span><span class="title">Club Competitions</span><span class="count">' + clubs.length + '</span></div><div class="grid">' + clubCards + '</div>' : '') +
    (nats.length ? '<div class="group-heading eu"><span class="bar"></span><span class="title">National Teams by Region</span><span class="count">' + nats.length + '</span></div><div class="grid">' + natCards + '</div>' : '');
}

function viewTeams() {
  const l = leagueById(state.league);
  const teams = teamsOf(state.league);
  const cards = teams.map(t => teamCardHtml(t, l)).join("");
  return '<div class="section-num">01 / SELECT TEAM</div>' +
    '<h2><img class="card-flag" style="width:24px;height:18px;margin-right:4px;vertical-align:middle;" src="' + flagUrl(l.countryCode) + '" alt="">' + escapeHtml(l.name) + ' <span class="count">' + teams.length + ' teams</span></h2>' +
    '<div class="grid teams">' + (cards || '<div class="sr-empty">No teams registered.</div>') + '</div>';
}

function teamCardHtml(t, l) {
  const cls = l.type === "club" ? "club" : l.group;
  const flagClass = l.type === "nat" ? "sq" : "";
  return '<button class="card ' + cls + '" data-team="' + t.id + '">' +
    '<div class="card-top"><img class="card-flag ' + flagClass + '" src="' + flagUrl(t.countryCode) + '" alt=""><span class="card-name">' + escapeHtml(t.name) + '</span></div>' +
    '<div class="card-sub"><span>' + escapeHtml(t.city || "") + '</span></div>' +
    '<div class="card-meta"><span>Browse seasons</span><span class="arrow">→</span></div>' +
    '</button>';
}

function viewSeasons() {
  const l = leagueById(state.league);
  const t = teamsOf(state.league).find(x => x.id === state.team);
  const seasons = seasonsFor(state.league, state.team);
  const flagClass = l.type === "nat" ? "sq" : "";
  const cards = seasons.map(s => {
    const hasReport = !!DATA.reports[reportKey(state.league, state.team, s)];
    const cls = hasReport ? "available" : "unavailable";
    return '<button class="card season ' + cls + '" data-season="' + s + '"><div class="label">' + (isNatLeague(state.league) ? "Tournament" : "Season") + '</div><div class="year">' + s + '</div></button>';
  }).join("");
  return '<div class="section-num">02 / SELECT SEASON</div>' +
    '<h2><img class="card-flag ' + flagClass + '" style="width:24px;height:' + (flagClass ? '24px' : '18px') + ';margin-right:4px;vertical-align:middle;' + (flagClass ? 'border-radius:50%;' : '') + '" src="' + flagUrl(t.countryCode) + '" alt="">' + escapeHtml(t.name) + ' <span style="font-size:13px;color:var(--muted);font-weight:400;">· ' + escapeHtml(l.name) + '</span> <span class="count">' + seasons.length + ' ' + (isNatLeague(state.league) ? "tournaments" : "seasons") + '</span></h2>' +
    '<div class="grid seasons">' + (cards || '<div class="sr-empty">No seasons registered for this team.</div>') + '</div>';
}

function runGlobalSearch(q) {
  const results = []; const needle = q.toLowerCase();
  DATA.leagues.forEach(l => {
    if (l.name.toLowerCase().indexOf(needle) >= 0 || l.country.toLowerCase().indexOf(needle) >= 0) {
      results.push({ kind: "league", league: l });
    }
  });
  Object.keys(DATA.teams).forEach(lid => {
    const l = leagueById(lid); if (!l) return;
    DATA.teams[lid].forEach(t => {
      if (t.name.toLowerCase().indexOf(needle) >= 0 || (t.city && t.city.toLowerCase().indexOf(needle) >= 0)) {
        results.push({ kind: "team", league: l, team: t });
      }
    });
  });
  return results;
}

function renderSearchResults(q) {
  const box = document.getElementById("searchResults");
  if (!q.trim()) { box.classList.add("hidden"); box.innerHTML = ""; return; }
  const results = runGlobalSearch(q);
  const items = results.slice(0, 40).map(r => {
    if (r.kind === "league") {
      return '<div class="sr-item" data-sr-league="' + r.league.id + '"><img class="sr-flag" src="' + flagUrl(r.league.countryCode) + '" alt=""><div class="sr-name">' + escapeHtml(r.league.name) + '</div><div class="sr-path">' + escapeHtml(r.league.country) + '</div><div class="sr-type">League</div></div>';
    }
    const flagCls = r.league.type === "nat" ? "sq" : "";
    return '<div class="sr-item" data-sr-league="' + r.league.id + '" data-sr-team="' + r.team.id + '"><img class="sr-flag ' + flagCls + '" src="' + flagUrl(r.team.countryCode) + '" alt=""><div class="sr-name">' + escapeHtml(r.team.name) + '</div><div class="sr-path">' + escapeHtml(r.league.name) + (r.team.city ? " · " + escapeHtml(r.team.city) : "") + '</div><div class="sr-type">Team</div></div>';
  }).join("");
  const heading = '<div class="sr-heading"><span>Search results</span><span class="count">' + results.length + ' match' + (results.length === 1 ? "" : "es") + '</span></div>';
  box.innerHTML = heading + (results.length ? items : '<div class="sr-empty">No results for "' + escapeHtml(q) + '"</div>');
  box.classList.remove("hidden");
  box.querySelectorAll(".sr-item").forEach(item => {
    item.addEventListener("click", () => {
      state.league = item.dataset.srLeague; state.team = item.dataset.srTeam || null;
      document.getElementById("search").value = ""; renderSearchResults(""); render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function render() {
  renderBreadcrumb();
  const view = document.getElementById("view");
  if (!state.league) view.innerHTML = viewLeagues();
  else if (!state.team) view.innerHTML = viewTeams();
  else view.innerHTML = viewSeasons();
  bindCardEvents();
}

function bindCardEvents() {
  document.querySelectorAll(".card[data-league]").forEach(c => {
    c.addEventListener("click", () => { state.league = c.dataset.league; state.team = null; render(); });
  });
  document.querySelectorAll(".card[data-team]").forEach(c => {
    c.addEventListener("click", () => { state.team = c.dataset.team; render(); });
  });
  document.querySelectorAll(".card[data-season]").forEach(c => {
    c.addEventListener("click", () => {
      const season = c.dataset.season;
      const key = reportKey(state.league, state.team, season);
      const path = DATA.reports[key];
      if (path) window.location.href = path;
      else { c.style.borderColor = "#dc2626"; setTimeout(() => { c.style.borderColor = ""; }, 600); }
    });
  });
}

document.getElementById("logo").addEventListener("click", () => {
  state.league = null; state.team = null;
  document.getElementById("search").value = ""; renderSearchResults(""); render();
});
document.getElementById("search").addEventListener("input", (e) => { renderSearchResults(e.target.value); });



(function applyInitialQuery() {
  const initial = readStateFromQuery();
  state.league = initial.league;
  state.team = initial.team;
})();

render();
</script>
</body>
</html>
